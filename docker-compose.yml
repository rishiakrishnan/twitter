version: "3.9"

services:

  twitter_app:
    build: .
    container_name: twitter_php
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - twitter_db

  twitter_db:
    image: mysql:8
    container_name: twitter_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: twitter
      MYSQL_USER: twitteruser
      MYSQL_PASSWORD: twitterpass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
